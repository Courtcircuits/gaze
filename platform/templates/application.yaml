apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-appofapps
spec:
  project: platform
  source:
    repoURL: "{{ .Values.source }}"
    path: 
    targetRevision: HEAD
  destination:
    server: "https://kubernetes.default.svc"
